name: AI-Multi-Task-Worker

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      filename:
        description: '請輸入要轉換的 Markdown 檔名 (例如 report_001.md，系統會自動搜尋 reports/ 資料夾)'
        required: true
        default: 'report.md'

jobs:
  research_job:
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event.label.name == 'research' || 
      github.event.label.name == 'presentation'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: pip install google-genai python-pptx
          
      - name: Step 1 - Determine Filename & Run AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 🚀 建立儲存資料夾
          mkdir -p reports
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # 手動觸發模式
            RAW_INPUT="${{ github.event.inputs.filename }}"
            echo "FINAL_FILENAME=reports/$RAW_INPUT" >> $GITHUB_ENV
            echo "DISPLAY_NAME=$RAW_INPUT" >> $GITHUB_ENV
          else
            # 標籤觸發模式 (使用 Issue 編號)
            FNAME_ONLY="report_${{ github.event.issue.number }}.md"
            echo "FINAL_FILENAME=reports/$FNAME_ONLY" >> $GITHUB_ENV
            echo "DISPLAY_NAME=$FNAME_ONLY" >> $GITHUB_ENV
            # 執行研究並導向至指定路徑
            python scripts/researcher.py > reports/$FNAME_ONLY
          fi
          
      - name: Step 2 - Generate PPTX from Report
        if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'presentation'
        run: |
          # 讀取包含 reports/ 路徑的完整檔案名稱
          python scripts/create_pptx.py ${{ env.FINAL_FILENAME }}
          
      - name: Post Report to Issue
        if: github.event_name == 'issues'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body-path: ${{ env.FINAL_FILENAME }}

      - name: Upload Presentation PPT
        if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'presentation'
        uses: actions/upload-artifact@v4
        with:
          # 🚀 修正：使用 DISPLAY_NAME (不含斜線) 以避免上傳錯誤
          name: ${{ env.DISPLAY_NAME }}-PPT
          path: Vector_Presentation.pptx
