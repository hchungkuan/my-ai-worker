name: AI-Multi-Task-Worker

on:
  issues:
    types: [labeled]
  # 🚀 新增：手動觸發功能，讓你可以選擇舊的 report.md 轉 PPT
  workflow_dispatch:
    inputs:
      filename:
        description: '請輸入要轉換的 Markdown 檔名 (例如 report_12.md)'
        required: true
        default: 'report.md'

jobs:
  research_job:
    # 支援標籤觸發 或 手動點擊按鈕觸發
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event.label.name == 'research' || 
      github.event.label.name == 'presentation'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: pip install google-genai python-pptx
          
      - name: Step 1 - Determine Filename & Run AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # 如果是手動按鈕觸發，使用輸入的檔名
            echo "FINAL_FILENAME=${{ github.event.inputs.filename }}" >> $GITHUB_ENV
          else
            # 如果是 Issue 標籤觸發，使用 Issue 編號命名
            FNAME="report_${{ github.event.issue.number }}.md"
            echo "FINAL_FILENAME=$FNAME" >> $GITHUB_ENV
            # 只有標籤觸發時才需要跑 AI 研究
            python scripts/researcher.py > $FNAME
          fi
          
      - name: Step 2 - Generate PPTX from Report
        # 標籤為 presentation 或 手動觸發時執行
        if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'presentation'
        run: |
          # 讀取動態設定的檔名並轉換
          python scripts/create_pptx.py ${{ env.FINAL_FILENAME }}
          
      - name: Post Report to Issue
        # 只有在 Issue 標籤觸發時才回覆留言 (手動觸發沒有 Issue 對象)
        if: github.event_name == 'issues'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body-path: ${{ env.FINAL_FILENAME }} # 🚀 修正：指向正確的動態檔名

      - name: Upload Presentation PPT
        if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'presentation'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FINAL_FILENAME }}-PPT
          path: Vector_Presentation.pptx # 需與 create_pptx.py 輸出的檔名一致
