name: AI-Multi-Task-Worker

on:
  issues:
    types: [labeled]

jobs:
  research_job:
    # 支援 research 和 presentation 兩個標籤觸發
    if: github.event.label.name == 'research' || github.event.label.name == 'presentation'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        # 同時安裝 AI SDK 與 PPTX 製作工具
        run: pip install google-genai python-pptx
          
      - name: Step 1 - Run AI Researcher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          TRIGGER_LABEL: ${{ github.event.label.name }}
        run: |
          # 將檔名設定為 report_Issue編號.md
          python scripts/researcher.py > report_${{ github.event.issue.number }}.md
          
      - name: Step 2 - Generate PPTX from Report
        # 🚀 只有在標籤為 presentation 時，才執行獨立的 PPT 轉換腳本
        if: github.event.label.name == 'presentation'
        run: |
          # 讀取剛剛產生的 report.md 並轉換為 PPTX
          python scripts/create_pptx.py report_${{ github.event.issue.number }}.md
          
      - name: Post Report to Issue
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body-path: report.md

      - name: Upload Presentation PPT
        # 只有在標籤為 presentation 時才上傳檔案
        if: github.event.label.name == 'presentation'
        uses: actions/upload-artifact@v4
        with:
          name: Vector-Research-PPT
          path: Vector_Presentation.pptx # 確保這與你的 create_pptx.py 輸出的檔名一致
