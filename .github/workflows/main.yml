name: AI-Researcher-Worker
on:
  issues:
    types: [labeled]

jobs:
  research_job:
    if: github.event.label.name == 'research'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Google AI SDK
        run: pip install google-genai
          
      - name: Run AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 使用 'tee' 指令：同時把結果印在螢幕上 (監控) 並存入檔案 (回覆)
          python scripts/researcher.py | tee report.md
          
      - name: Post Report to Issue
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body-path: report.md
